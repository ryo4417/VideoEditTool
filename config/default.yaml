# =====================================================================
# VideoEditTool 既定設定
#   編集条件は全てここで管理する（コード変更不要）。
#   案件プロファイル（config/profiles/*.yaml）でこの値を上書きできる。
# =====================================================================

project:
  name: VideoEditTool
  version: "0.1.0"

# --- 解析（アナライザ）: name ごとに enabled で ON/OFF ---
analysis:
  silence:
    enabled: true
    noise_threshold_db: -30   # これ以下(dB)を無音とみなす
    min_silence_sec: 0.5      # これ以上続く無音のみ検出
  speech:                     # 発話区間 = 無音の補集合（最低限動く版）
    enabled: false            # 消費するルール実装後に有効化
    min_speech_sec: 0.2       # これ未満の発話断片は除外
  transcript:                 # ローカルWhisperによる文字起こし（内容ベースのルール用）
    enabled: false            # 有効化には faster-whisper が必要（重い依存）
    provider: whisper         # whisper | null
    model: base               # tiny/base/small/medium/large-v3 など
    language: ja              # 言語（null で自動判定）
    device: cpu               # cpu | cuda
    compute_type: int8        # int8/float16 など

# --- 編集ルール: name ごとに enabled で ON/OFF ---
rules:
  silence:
    enabled: true
    min_cut_sec: 0.5          # この長さを超える無音のみカット
    keep_padding_sec: 0.1     # 発話前後に残す余白
  filler:                     # フィラー除去（要 transcript）
    enabled: false            # analysis.transcript を有効化してから使う
    words: ["えー", "えーと", "えっと", "あのー", "あの", "あー", "まあ", "その", "um", "uh", "er"]
    padding_sec: 0.0
  duplicate:                  # 重複除去（要 transcript）
    enabled: false
    min_words: 1              # 検出する繰り返し語句の最小語数
    max_words: 6              # 同上・最大語数
  restate:                    # 言い直し【方式B: 類似句】（要 transcript）
    enabled: false
    min_words: 2
    max_words: 6
    sim_threshold: 0.5        # 隣接句の語の共有率がこれ以上なら言い直しとみなす
  tempo:                      # テンポ調整（長い間の超過分だけカット。要 analysis.silence）
    enabled: false            # silence を全消しせず自然な間を残したい場合に使う
    target_pause_sec: 0.4     # 残す間の長さ
    min_gap_sec: 0.6          # これ以上の間だけ短縮対象

# --- タイムライン整形 ---
timeline:
  merge_gap_sec: 0.2          # この間隔以下の残す区間は結合
  min_segment_sec: 0.3        # これ未満の残す区間は除去

# --- 品質チェック（AIなしベースライン。編集レポート・確認用）---
quality:
  report: false               # true で <入力名>.report.json を出力
  max_removed_ratio: 0.6      # 削除率がこれを超えると警告
  warn_min_segment_sec: 0.5   # これ未満の残り区間があると警告

# --- 書き出し ---
export:
  format: json                # json | edl | html（編集確認プレビュー）
  output_dir: output
  render: false               # true で ffmpeg による実カット動画を出力
  render_ext: mp4

# --- AI（補助のみ・既定オフ。仕様書 §9）ローカルLLM(Ollama) ---
ai:
  enabled: false              # 品質採点・編集漏れ確認・改善案などに限定
  provider: ollama            # ollama | null
  model: llama3.1             # Ollama のモデル名（ollama pull で用意）
  host: "http://localhost:11434"
