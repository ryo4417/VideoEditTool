# 対談向け作業プロファイル（p3b 検証用）
# ねらい: 自然な「間」は tempo で残しつつ、
#         言い直し・重複・フィラーは内容ベースで除去する。英語素材。

analysis:
  silence:
    enabled: true
    min_silence_sec: 0.4
  transcript:
    enabled: true
    provider: whisper
    model: small          # 英語短尺なら small で十分な精度
    language: en
    device: cpu
    compute_type: int8

rules:
  # 無音そのものの全消しはしない（間は tempo で調整）
  silence:
    enabled: false
  tempo:
    enabled: true
    target_pause_sec: 0.5   # 残す間
    min_gap_sec: 0.7        # これ以上の間だけ超過分を短縮
  filler:
    enabled: true
    words: ["um", "uh", "er", "ah", "hmm", "you know", "i mean"]
    padding_sec: 0.0
  duplicate:
    enabled: true
    min_words: 2
    max_words: 6
  restate:
    enabled: true
    min_words: 2
    max_words: 6
    sim_threshold: 0.6

timeline:
  merge_gap_sec: 0.2
  min_segment_sec: 0.3

quality:
  report: true
  max_removed_ratio: 0.7
