<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VideoEditTool — 編集確認</title>
<style>
  :root {
    --bg: #f6f7f9; --panel: #ffffff; --ink: #1a1d21; --muted: #6b7280;
    --border: #e5e7eb; --accent: #4f46e5; --accent-ink:#ffffff;
    --keep: #16a34a; --cut: #dc2626; --track:#e5e7eb;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#0f1115; --panel:#171a21; --ink:#e6e8eb; --muted:#9aa3af;
      --border:#262b34; --accent:#818cf8; --track:#2a2f3a;
      --shadow: 0 1px 3px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--ink); line-height:1.5; }
  header { padding: 1rem 1.5rem; border-bottom:1px solid var(--border); background:var(--panel);
    display:flex; align-items:center; gap:.6rem; position:sticky; top:0; z-index:10; }
  header h1 { font-size:1.05rem; margin:0; font-weight:650; }
  header .dot { width:12px; height:12px; border-radius:3px; background:var(--accent); }
  main { max-width: 1100px; margin: 0 auto; padding: 1.25rem 1.5rem 4rem; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:12px;
    padding:1rem 1.15rem; box-shadow:var(--shadow); margin-bottom:1.15rem; }
  .row { display:flex; gap:.6rem; flex-wrap:wrap; align-items:center; }
  label.f { font-size:.8rem; color:var(--muted); display:block; margin-bottom:.25rem; }
  input[type=text], select { font:inherit; padding:.5rem .6rem; border:1px solid var(--border);
    border-radius:8px; background:var(--bg); color:var(--ink); }
  input[type=text] { flex:1; min-width:260px; }
  button { font:inherit; font-weight:600; border:0; border-radius:8px; padding:.55rem .95rem;
    background:var(--accent); color:var(--accent-ink); cursor:pointer; }
  button.ghost { background:transparent; color:var(--accent); border:1px solid var(--accent); }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .metrics { display:flex; gap:.75rem; flex-wrap:wrap; }
  .metric { flex:1; min-width:110px; background:var(--bg); border:1px solid var(--border);
    border-radius:10px; padding:.6rem .8rem; }
  .metric .v { font-size:1.35rem; font-weight:700; }
  .metric .k { font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; }
  video { width:100%; border-radius:10px; background:#000; max-height:44vh; }
  /* タイムライン */
  .timeline { position:relative; height:52px; background:var(--keep); border-radius:8px;
    overflow:hidden; cursor:pointer; margin-top:.4rem; }
  .timeline #wave { position:absolute; inset:0; width:100%; height:100%; opacity:.28; pointer-events:none; }
  .timeline .cut { position:absolute; top:0; height:100%; background:var(--cut); opacity:.9; }
  .timeline .cut.off { background:repeating-linear-gradient(45deg,var(--track),var(--track) 6px,transparent 6px,transparent 12px); opacity:.6; }
  .timeline .play { position:absolute; top:0; width:2px; height:100%; background:#fff;
    box-shadow:0 0 0 1px rgba(0,0,0,.5); pointer-events:none; }
  .ruler { position:relative; height:18px; margin-top:2px; color:var(--muted); font-size:.7rem; }
  .ruler span { position:absolute; transform:translateX(-50%); }
  .legend { font-size:.78rem; color:var(--muted); margin-top:.5rem; }
  .legend i { display:inline-block; width:11px; height:11px; border-radius:2px; vertical-align:middle; margin:0 .25rem 0 .8rem; }
  /* 候補リスト */
  .cand { display:flex; align-items:center; gap:.7rem; padding:.5rem .3rem; border-bottom:1px solid var(--border); }
  .cand:last-child { border-bottom:0; }
  .cand .badge { font-size:.7rem; font-weight:700; padding:.15rem .45rem; border-radius:999px;
    background:color-mix(in srgb, var(--accent) 15%, transparent); color:var(--accent); }
  .cand .tc { font-variant-numeric:tabular-nums; color:var(--muted); font-size:.82rem; min-width:120px; }
  .cand .reason { flex:1; }
  .cand button.seek { background:transparent; color:var(--accent); padding:.2rem .5rem; font-size:.8rem; }
  .hidden { display:none; }
  .warn { color:#b45309; font-size:.85rem; margin:.2rem 0; }
  #status { font-size:.85rem; color:var(--muted); }
  .outs { font-size:.82rem; font-family:ui-monospace,monospace; word-break:break-all; }
  h2 { font-size:.92rem; margin:.1rem 0 .7rem; }
</style>
</head>
<body>
<header><span class="dot"></span><h1>VideoEditTool — 編集確認</h1></header>
<main>
  <div class="card">
    <div class="row">
      <div style="flex:1; min-width:260px;">
        <label class="f" for="path">動画ファイルのパス</label>
        <input type="text" id="path" placeholder="例: C:\\path\\to\\video.mp4">
      </div>
      <div>
        <label class="f" for="profile">プロファイル</label>
        <select id="profile"><option value="">（なし）</option>
          <option value="youtube">youtube</option><option value="interview">interview</option></select>
      </div>
      <div style="align-self:flex-end;">
        <button id="analyze">解析</button>
      </div>
    </div>
    <div class="row" style="margin-top:.7rem; gap:1rem;">
      <span style="font-size:.8rem; color:var(--muted);">検出:</span>
      <label><input type="checkbox" id="r_silence" checked> 無音</label>
      <label><input type="checkbox" id="r_filler"> フィラー</label>
      <label><input type="checkbox" id="r_duplicate"> 重複</label>
      <label title="フィラー/重複にはローカルWhisperが必要"><input type="checkbox" id="r_transcript"> 文字起こし(Whisper)</label>
    </div>
    <div id="status" style="margin-top:.6rem;">動画パスを入力して「解析」を押してください。</div>
  </div>

  <div id="result" class="hidden">
    <div class="card">
      <video id="video" controls></video>
      <div class="timeline" id="timeline"><canvas id="wave"></canvas><div class="play" id="play" style="left:0"></div></div>
      <div class="ruler" id="ruler"></div>
      <div class="legend"><i style="background:var(--keep)"></i>残す<i style="background:var(--cut)"></i>カット（チェックON）<i style="background:var(--track)"></i>カット解除</div>
    </div>

    <div class="card">
      <h2>サマリー</h2>
      <div class="metrics" id="metrics"></div>
      <div id="warnings"></div>
    </div>

    <div class="card">
      <h2>編集候補 <span id="candcount" style="color:var(--muted);font-weight:400;"></span></h2>
      <div id="cands"></div>
    </div>

    <div class="card">
      <h2>書き出し</h2>
      <div class="row">
        <div><label class="f" for="fmt">形式</label>
          <select id="fmt"><option>json</option><option>edl</option><option value="html">html（確認用）</option><option>fcpxml</option></select></div>
        <div style="align-self:flex-end;"><label class="f"><input type="checkbox" id="render"> 実カット動画も出力</label></div>
        <div style="align-self:flex-end;"><button id="export">書き出し</button></div>
      </div>
      <div id="exportout" class="outs" style="margin-top:.6rem;"></div>
    </div>
  </div>
</main>
<script src="/app.js"></script>
</body>
</html>
